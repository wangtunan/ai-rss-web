name: Fetch News JSON

on:
  schedule:
    - cron: '30 0 * * *'
    - cron: '30 8 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch-news-json:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Run script
        working-directory: backend
        env:
          DATABASE_URL: sqlite:///./data/news.db
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}
          OPENAI_MODEL: ${{ secrets.OPENAI_MODEL }}
        run: |
          python -m alembic upgrade head
          python -m app.jobs.fetch_news --max-entries 20

      - name: Commit and push updated data
        run: |
          git config user.name "rss-[bot]"
          git config user.email "why583440138@gmail.com"
          git add frontend/public/data
          git diff --staged --quiet || git commit -m "chore: update generated news data"
          git push
