name: Daily News Update

on:
  schedule:
    - cron: '30 0 * * *'
    - cron: '30 8 * * *'
  workflow_dispatch:

jobs:
  run-python:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      TZ: Asia/Shanghai

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install -r backend/requirements.txt

      - name: Run script
        working-directory: backend
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}
          OPENAI_MODEL: ${{ secrets.OPENAI_MODEL }}
        run: python main.py

      - name: Commit and push updated data
        run: |
          git config user.name "rss-[bot]"
          git config user.email "why583440138@gmail.com"
          git add frontend/public/data.json backend/data
          git diff --staged --quiet || git commit -m "chore: update generated news data"
          git push
